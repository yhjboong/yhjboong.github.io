<!-- Layout and typography refinements -->
<style>
  html {
    scroll-behavior: smooth;
  }

  /* Offset anchor targets for fixed navbar */
  h2[id], #about {
    scroll-margin-top: 80px;
  }

  /* --- Typography & Content Spacing --- */
  .page__content {
    line-height: 1.75;
  }
  .page__content p {
    margin-bottom: 1.4em;
  }
  .page__content h2 {
    margin-top: 2.5em;
    margin-bottom: 1em;
    font-size: 1.4em;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .page__content h2:first-child {
    margin-top: 0;
  }
  .page__content ol,
  .page__content ul {
    margin-bottom: 1.5em;
  }
  .page__content li {
    margin-bottom: 0.6em;
    line-height: 1.65;
  }

  /* Page title */
  .page__title {
    font-size: 1.8em;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 1.2em;
  }

  /* --- Sidebar Profile Refinements --- */
  .author__avatar img {
    max-width: 180px;
    border: none !important;
    padding: 0 !important;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
  }
  .author__name {
    font-size: 1.15em;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .author__bio {
    color: var(--global-link-color);
    font-size: 0.82em;
    line-height: 1.55;
  }
  .author__urls .fa-fw,
  .author__urls .ai,
  .author__urls .fab,
  .author__urls .fas,
  .author__urls .icon-pad-right {
    font-size: 1.35em;
    vertical-align: middle;
    opacity: 0.7;
  }
  .author__urls li {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .author__urls a {
    font-size: 0.9em !important;
  }

  /* --- Publication figure responsive --- */
  @media (max-width: 600px) {
    .page__content div[style*="display: flex"] {
      flex-direction: column;
    }
    .page__content div[style*="display: flex"] img {
      width: 100% !important;
      min-width: unset !important;
    }
  }
</style>

<!-- Smooth scroll for same-page anchor links in navbar -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.greedy-nav a[href*="#"]').forEach(function(link) {
    link.addEventListener('click', function(e) {
      var href = this.getAttribute('href');
      var hash = href.includes('#') ? '#' + href.split('#')[1] : null;
      if (!hash) return;
      var path = window.location.pathname.replace(/\/+$/, '');
      var isHome = path === '' || path === '/index.html';
      if (isHome || href.startsWith('#')) {
        var target = document.querySelector(hash);
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth' });
          history.pushState(null, null, hash);
        }
      }
    });
  });
});
</script>
